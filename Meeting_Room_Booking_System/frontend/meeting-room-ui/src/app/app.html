<div class="app-shell">
  @if (!isAuthPage) {
  <nav class="navbar navbar-expand-lg navbar-dark top-nav shadow-sm">
    <div class="container">
      <a class="navbar-brand fw-bold d-flex align-items-center" routerLink="/rooms">
        <img src="/roomBoard_logo.png" alt="RoomBoard" class="roomboard-logo me-2">
        <span>RoomBoard</span>
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
        aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-3">

          <li class="nav-item me-lg-3">
            <div
              class="d-flex align-items-center bg-white bg-opacity-10 p-2 rounded border border-white border-opacity-10">
              <i class="bi bi-person-circle text-white fs-4 me-2"></i>
              <div class="text-white">
                <div class="fw-bold lh-1" style="font-size: 0.85rem;">{{ userName }}</div>
                <div class="small text-white-50 lh-1 mt-1" style="font-size: 0.75rem;">{{ userEmail }}</div>
              </div>
              <span class="badge ms-2 border border-white border-opacity-25 text-white fw-normal"
                style="font-size: 0.65rem; background: rgba(255, 255, 255, 0.1);">
                {{ userRole }}
              </span>
            </div>
          </li>

          <li class="nav-item">
            <a class="nav-link" routerLink="/rooms" routerLinkActive="active">Rooms</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" routerLink="/bookings" routerLinkActive="active">
              {{ isAdmin ? 'All Bookings' : 'My Bookings' }}
            </a>
          </li>
          @if (isAdmin) {
            <li class="nav-item">
              <a class="nav-link" routerLink="/users" routerLinkActive="active">Users</a>
            </li>
          }
          <li class="nav-item ms-lg-2">
            <button class="btn btn-outline-light btn-sm" type="button" (click)="logout()">
              <i class="bi bi-box-arrow-right me-1"></i>Logout
            </button>
          </li>
        </ul>
      </div>
    </div>
  </nav>
  }

  <main class="page-wrapper">
    <router-outlet></router-outlet>
  </main>
  @if (!isAuthPage) {
  <footer class="footer-bar">
    <div class="container">
      <div class="row align-items-center">
        <div class="col-md-6 text-center text-md-start">
          <p class="mb-0 fw-semibold text-white">
            &copy; 2026 RoomBoard.
             <!-- &copy; 2026 RoomBoard Meeting Room Management System. -->
            <span class="fw-normal text-white-500 ms-1">All rights reserved.</span>
             <!-- <span class="fw-normal text-white-500 ms-1">Designed for efficient meeting room booking and management.</span> -->
          </p>
        </div>

        <div class="col-md-6 text-center text-md-end mt-2 mt-md-0">
          <span class="version-tag">
            <i class="bi bi-cpu-fill me-1 text-primary"></i> v1.0.4-stable
          </span>
        </div>
      </div>
    </div>
  </footer>
  }
</div>
